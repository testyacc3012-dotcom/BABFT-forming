<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hull & Shape Calculator — BABFT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep:#0a1420;
    --bg-panel:#0f1e30;
    --bg-panel-hi:#152943;
    --grid-line:rgba(120,170,220,0.07);
    --blue-accent:#4fa3e3;
    --blue-accent-soft:#2c6ba3;
    --orange:#f2a03d;
    --orange-deep:#d4841f;
    --green:#5fd1a0;
    --text-primary:#eaf1f8;
    --text-muted:#8ea3bc;
    --text-faint:#5a6f89;
    --line:rgba(120,170,220,0.16);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{ background:var(--bg-deep); color:var(--text-primary); font-family:'Space Grotesk',sans-serif; }
  body{
    min-height:100vh;
    background-image:
      linear-gradient(var(--grid-line) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
    background-size:34px 34px;
  }
  .mono{ font-family:'JetBrains Mono', monospace; }

  header{
    padding:1.8rem clamp(1.2rem,4vw,3rem) 1.2rem;
    border-bottom:1px solid var(--line);
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .brand{ display:flex; align-items:center; gap:0.6rem; }
  .brand .mark{
    width:34px; height:34px; border-radius:8px;
    background:linear-gradient(135deg, var(--blue-accent), var(--blue-accent-soft));
    display:flex; align-items:center; justify-content:center;
    font-weight:700; font-size:1rem; color:#06121f;
  }
  .brand .name{ font-weight:700; font-size:1.05rem; letter-spacing:0.01em; }
  .brand .name small{ display:block; font-weight:500; font-size:0.7rem; color:var(--text-faint); letter-spacing:0.08em; text-transform:uppercase; }

  main{ max-width:1080px; margin:0 auto; padding:2.2rem clamp(1.2rem,4vw,3rem) 4rem; }

  .shape-tabs{
    display:flex;
    gap:0.5rem;
    margin-bottom:1.6rem;
    flex-wrap:wrap;
  }
  .shape-tabs button{
    font-family:'Space Grotesk',sans-serif;
    font-weight:600;
    font-size:0.85rem;
    color:var(--text-muted);
    background:var(--bg-panel);
    border:1px solid var(--line);
    padding:0.65rem 1.15rem;
    border-radius:10px;
    cursor:pointer;
    transition:all 0.15s ease;
  }
  .shape-tabs button.active{
    color:#06121f;
    background:var(--orange);
    border-color:var(--orange-deep);
  }
  .shape-tabs button:hover:not(.active){ border-color:var(--blue-accent); color:var(--text-primary); }

  .theme-row{
    display:flex;
    align-items:center;
    gap:0.6rem;
    margin-bottom:2rem;
  }
  .theme-row span{ font-size:0.78rem; color:var(--text-faint); }
  .swatch{
    width:22px; height:22px; border-radius:50%;
    border:2px solid transparent;
    cursor:pointer;
  }
  .swatch.active{ border-color:var(--text-primary); }

  .grid{
    display:grid;
    grid-template-columns:320px 1fr;
    gap:1.4rem;
  }
  @media (max-width:820px){ .grid{ grid-template-columns:1fr; } }

  .panel{
    background:var(--bg-panel);
    border:1px solid var(--line);
    border-radius:16px;
    padding:1.5rem;
  }
  .panel h2{
    font-size:0.78rem;
    text-transform:uppercase;
    letter-spacing:0.1em;
    color:var(--text-faint);
    margin-bottom:1.1rem;
    font-weight:600;
  }

  .field{ margin-bottom:1.1rem; }
  .field label{
    display:flex;
    justify-content:space-between;
    font-size:0.85rem;
    color:var(--text-muted);
    margin-bottom:0.4rem;
  }
  .field label .val{ color:var(--accent, var(--orange)); font-family:'JetBrains Mono',monospace; font-weight:700; }
  .field input[type="range"]{
    width:100%;
    accent-color:var(--accent, var(--orange));
  }
  .field input[type="number"]{
    width:100%;
    background:var(--bg-panel-hi);
    border:1px solid var(--line);
    color:var(--text-primary);
    border-radius:8px;
    padding:0.5rem 0.7rem;
    font-family:'JetBrains Mono',monospace;
    font-size:0.9rem;
  }

  .results{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:0.7rem;
    margin-top:1.4rem;
  }
  .result-card{
    background:var(--bg-panel-hi);
    border:1px solid var(--line);
    border-radius:10px;
    padding:0.75rem 0.85rem;
  }
  .result-card .label{ font-size:0.7rem; color:var(--text-faint); text-transform:uppercase; letter-spacing:0.06em; margin-bottom:0.25rem; }
  .result-card .value{ font-family:'JetBrains Mono',monospace; font-weight:700; font-size:1.05rem; color:var(--accent, var(--orange)); }

  .preview-panel svg{ width:100%; height:auto; display:block; }
  .preview-views{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:1rem;
  }
  @media (max-width:560px){ .preview-views{ grid-template-columns:1fr; } }
  .view-label{ text-align:center; font-size:0.8rem; color:var(--text-faint); margin-top:0.5rem; }

  .tutorial{
    margin-top:2rem;
    background:var(--bg-panel);
    border:1px solid var(--line);
    border-radius:16px;
    padding:1.6rem 1.6rem 1.8rem;
  }
  .tutorial h2{
    font-size:1.1rem;
    margin-bottom:0.3rem;
  }
  .tutorial .sub{ color:var(--text-muted); font-size:0.88rem; margin-bottom:1.3rem; }
  .steps{ list-style:none; counter-reset:step; display:flex; flex-direction:column; gap:1rem; }
  .steps li{
    counter-increment:step;
    display:flex;
    gap:0.9rem;
    padding-bottom:1rem;
    border-bottom:1px solid var(--line);
  }
  .steps li:last-child{ border-bottom:none; padding-bottom:0; }
  .steps li::before{
    content:counter(step);
    flex:none;
    width:28px; height:28px;
    border-radius:50%;
    background:var(--accent, var(--orange));
    color:#06121f;
    font-family:'JetBrains Mono',monospace;
    font-weight:700;
    font-size:0.85rem;
    display:flex; align-items:center; justify-content:center;
  }
  .steps li .step-body strong{ display:block; margin-bottom:0.2rem; font-size:0.95rem; }
  .steps li .step-body p{ color:var(--text-muted); font-size:0.87rem; line-height:1.5; }

  footer{
    text-align:center;
    padding:1.6rem;
    color:var(--text-faint);
    font-size:0.75rem;
    border-top:1px solid var(--line);
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="mark">⛵</div>
    <div class="name">Hull & Shape Calc<small>for Build A Boat For Treasure</small></div>
  </div>
</header>

<main>
  <div class="shape-tabs" role="tablist" aria-label="Choose a shape">
    <button class="active" data-shape="cone">Cone</button>
    <button data-shape="pyramid">Pyramid</button>
    <button data-shape="sphere">Sphere / Dome</button>
  </div>

  <div class="theme-row">
    <span>Accent:</span>
    <div class="swatch active" style="background:#f2a03d;" data-color="#f2a03d"></div>
    <div class="swatch" style="background:#4fa3e3;" data-color="#4fa3e3"></div>
    <div class="swatch" style="background:#5fd1a0;" data-color="#5fd1a0"></div>
    <div class="swatch" style="background:#e26d9c;" data-color="#e26d9c"></div>
  </div>

  <div class="grid">
    <!-- CONTROLS -->
    <div class="panel" id="controlsPanel">
      <h2 id="controlsTitle">Cone settings</h2>
      <div id="fieldsContainer"></div>

      <div class="results" id="resultsContainer"></div>
    </div>

    <!-- PREVIEW -->
    <div class="panel preview-panel">
      <h2>Preview</h2>
      <div class="preview-views">
        <div>
          <svg id="sideSvg" viewBox="0 0 260 260"></svg>
          <div class="view-label">Side view</div>
        </div>
        <div>
          <svg id="frontSvg" viewBox="0 0 260 260"></svg>
          <div class="view-label">Front view</div>
        </div>
      </div>
    </div>
  </div>

  <div class="tutorial">
    <h2 id="tutTitle">Building this in BABFT</h2>
    <p class="sub" id="tutSub">General steps for turning these numbers into blocks in-game.</p>
    <ol class="steps" id="tutSteps"></ol>
  </div>
</main>

<footer>Not affiliated with Build A Boat For Treasure or Roblox. Just a geometry helper for builders.</footer>

<script>
  const accentEls = document.querySelectorAll('[style*="--accent"], .field label .val, .result-card .value, .steps li::before');
  let accent = '#f2a03d';

  document.querySelectorAll('.swatch').forEach(sw=>{
    sw.addEventListener('click', ()=>{
      document.querySelectorAll('.swatch').forEach(s=>s.classList.remove('active'));
      sw.classList.add('active');
      accent = sw.dataset.color;
      document.documentElement.style.setProperty('--accent', accent);
      render();
    });
  });
  document.documentElement.style.setProperty('--accent', accent);

  const fieldsContainer = document.getElementById('fieldsContainer');
  const resultsContainer = document.getElementById('resultsContainer');
  const controlsTitle = document.getElementById('controlsTitle');
  const tutTitle = document.getElementById('tutTitle');
  const tutSteps = document.getElementById('tutSteps');
  const sideSvg = document.getElementById('sideSvg');
  const frontSvg = document.getElementById('frontSvg');

  let shape = 'cone';
  let state = { sides: 12, diameter: 20, height: 16, rings: 6 };

  const SHAPE_CONFIG = {
    cone: {
      title: 'Cone settings',
      fields: [
        { key:'sides', label:'No. of sides', min:3, max:64, step:1 },
        { key:'diameter', label:'Diameter (studs)', min:1, max:200, step:0.5 },
        { key:'height', label:'Height (studs)', min:1, max:200, step:0.5 }
      ]
    },
    pyramid: {
      title: 'Pyramid settings',
      fields: [
        { key:'sides', label:'No. of sides (base)', min:3, max:32, step:1 },
        { key:'diameter', label:'Base diameter (studs)', min:1, max:200, step:0.5 },
        { key:'height', label:'Height (studs)', min:1, max:200, step:0.5 }
      ]
    },
    sphere: {
      title: 'Sphere / dome settings',
      fields: [
        { key:'diameter', label:'Diameter (studs)', min:1, max:200, step:0.5 },
        { key:'rings', label:'No. of horizontal rings', min:2, max:24, step:1 },
        { key:'sides', label:'Segments per ring', min:3, max:64, step:1 }
      ]
    }
  };

  function buildFields(){
    const cfg = SHAPE_CONFIG[shape];
    controlsTitle.textContent = cfg.title;
    fieldsContainer.innerHTML = '';
    cfg.fields.forEach(f=>{
      const wrap = document.createElement('div');
      wrap.className = 'field';
      wrap.innerHTML = `
        <label>${f.label} <span class="val">${state[f.key]}</span></label>
        <input type="range" min="${f.min}" max="${f.max}" step="${f.step}" value="${state[f.key]}" data-key="${f.key}">
      `;
      fieldsContainer.appendChild(wrap);
    });
    fieldsContainer.querySelectorAll('input[type="range"]').forEach(input=>{
      input.addEventListener('input', ()=>{
        state[input.dataset.key] = parseFloat(input.value);
        input.previousElementSibling.querySelector('.val').textContent = state[input.dataset.key];
        render();
      });
    });
  }

  function resultCard(label, value){
    return `<div class="result-card"><div class="label">${label}</div><div class="value">${value}</div></div>`;
  }

  function computeCone(){
    const r = state.diameter/2;
    const h = state.height;
    const n = state.sides;
    const slant = Math.sqrt(r*r + h*h);
    const exteriorAngle = 360/n;
    const baseEdge = 2*r*Math.sin(Math.PI/n);
    return { r, h, n, slant, exteriorAngle, baseEdge };
  }

  function computePyramid(){
    const r = state.diameter/2;
    const h = state.height;
    const n = state.sides;
    const apothem = r*Math.cos(Math.PI/n);
    const baseEdge = 2*r*Math.sin(Math.PI/n);
    const slantEdge = Math.sqrt(r*r + h*h);
    const faceHeight = Math.sqrt(apothem*apothem + h*h);
    const exteriorAngle = 360/n;
    return { r, h, n, apothem, baseEdge, slantEdge, faceHeight, exteriorAngle };
  }

  function computeSphere(){
    const R = state.diameter/2;
    const rings = state.rings;
    const segs = state.sides;
    const ringAngleStep = 180/rings;
    const exteriorAngle = 360/segs;
    // widest ring radius (equator, approx)
    const midTheta = 90;
    const equatorRadius = R*Math.sin(midTheta*Math.PI/180);
    return { R, rings, segs, ringAngleStep, exteriorAngle, equatorRadius };
  }

  function buildResults(){
    resultsContainer.innerHTML = '';
    if(shape==='cone'){
      const c = computeCone();
      resultsContainer.innerHTML =
        resultCard('Radius', c.r.toFixed(2)) +
        resultCard('Slant length', c.slant.toFixed(2)) +
        resultCard('Exterior angle', c.exteriorAngle.toFixed(2)+'°') +
        resultCard('Base edge length', c.baseEdge.toFixed(2));
    } else if(shape==='pyramid'){
      const p = computePyramid();
      resultsContainer.innerHTML =
        resultCard('Apothem', p.apothem.toFixed(2)) +
        resultCard('Base edge length', p.baseEdge.toFixed(2)) +
        resultCard('Slant edge (corner)', p.slantEdge.toFixed(2)) +
        resultCard('Face height', p.faceHeight.toFixed(2)) +
        resultCard('Exterior angle', p.exteriorAngle.toFixed(2)+'°');
    } else {
      const s = computeSphere();
      resultsContainer.innerHTML =
        resultCard('Radius', s.R.toFixed(2)) +
        resultCard('Angle per ring', s.ringAngleStep.toFixed(2)+'°') +
        resultCard('Exterior angle (ring)', s.exteriorAngle.toFixed(2)+'°') +
        resultCard('Equator radius', s.equatorRadius.toFixed(2));
    }
  }

  function svgEl(tag, attrs){
    const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
    Object.entries(attrs).forEach(([k,v])=> el.setAttribute(k,v));
    return el;
  }

  function drawCone(){
    sideSvg.innerHTML = ''; frontSvg.innerHTML = '';
    const c = computeCone();
    const maxDim = Math.max(c.r, c.h) || 1;
    const scale = 90/maxDim;
    const originX = 40, originY = 220;

    // side view: right triangle
    const rPx = c.r*scale, hPx = c.h*scale;
    sideSvg.appendChild(svgEl('line', {x1:originX, y1:originY, x2:originX, y2:originY-hPx, stroke:accent, 'stroke-width':3}));
    sideSvg.appendChild(svgEl('line', {x1:originX, y1:originY, x2:originX+rPx, y2:originY, stroke:accent, 'stroke-width':3, opacity:0.5}));
    sideSvg.appendChild(svgEl('line', {x1:originX, y1:originY-hPx, x2:originX+rPx, y2:originY, stroke:'#4fa3e3', 'stroke-width':3}));
    sideSvg.appendChild(svgEl('circle', {cx:originX+rPx, cy:originY, r:5, fill:'#5fd1a0'}));

    // front view: cone silhouette from apex, n indicated by a couple guide lines
    const cx = 130, apexY = 210-hPx, baseY = 210;
    frontSvg.appendChild(svgEl('line', {x1:cx-rPx, y1:baseY, x2:cx, y2:apexY, stroke:'#c26bd8', 'stroke-width':2.5}));
    frontSvg.appendChild(svgEl('line', {x1:cx+rPx, y1:baseY, x2:cx, y2:apexY, stroke:'#c26bd8', 'stroke-width':2.5}));
    frontSvg.appendChild(svgEl('line', {x1:cx, y1:baseY, x2:cx, y2:apexY, stroke:'#4fa3e3', 'stroke-width':2.5}));
    frontSvg.appendChild(svgEl('line', {x1:cx-rPx, y1:baseY, x2:cx+rPx, y2:baseY, stroke:accent, 'stroke-width':2, opacity:0.5}));
    frontSvg.appendChild(svgEl('circle', {cx:cx-rPx, cy:baseY, r:4, fill:'#c26bd8'}));
    frontSvg.appendChild(svgEl('circle', {cx:cx+rPx, cy:baseY, r:4, fill:'#c26bd8'}));
  }

  function drawPyramid(){
    sideSvg.innerHTML = ''; frontSvg.innerHTML = '';
    const p = computePyramid();
    const maxDim = Math.max(p.r, p.h) || 1;
    const scale = 90/maxDim;
    const rPx = p.r*scale, hPx = p.h*scale;
    const originX = 40, originY = 220;

    sideSvg.appendChild(svgEl('line', {x1:originX, y1:originY, x2:originX, y2:originY-hPx, stroke:accent, 'stroke-width':3}));
    sideSvg.appendChild(svgEl('line', {x1:originX, y1:originY, x2:originX+rPx, y2:originY, stroke:accent, 'stroke-width':3, opacity:0.5}));
    sideSvg.appendChild(svgEl('line', {x1:originX, y1:originY-hPx, x2:originX+rPx, y2:originY, stroke:'#4fa3e3', 'stroke-width':3}));

    const cx = 130, apexY = 210-hPx, baseY = 210;
    frontSvg.appendChild(svgEl('line', {x1:cx-rPx, y1:baseY, x2:cx, y2:apexY, stroke:'#c26bd8', 'stroke-width':2.5}));
    frontSvg.appendChild(svgEl('line', {x1:cx+rPx, y1:baseY, x2:cx, y2:apexY, stroke:'#c26bd8', 'stroke-width':2.5}));
    frontSvg.appendChild(svgEl('line', {x1:cx, y1:baseY, x2:cx, y2:apexY, stroke:'#4fa3e3', 'stroke-width':2.5}));
    frontSvg.appendChild(svgEl('line', {x1:cx-rPx, y1:baseY, x2:cx+rPx, y2:baseY, stroke:accent, 'stroke-width':2, opacity:0.5}));
    frontSvg.appendChild(svgEl('polygon', {points:`${cx-rPx},${baseY} ${cx},${apexY} ${cx+rPx},${baseY}`, fill:'none', stroke:'#c26bd8', 'stroke-width':1, 'stroke-dasharray':'3,3'}));
  }

  function drawSphere(){
    sideSvg.innerHTML = ''; frontSvg.innerHTML = '';
    const s = computeSphere();
    const scale = 90/(s.R || 1);
    const cx = 130, cy = 130;
    const Rpx = s.R*scale;

    sideSvg.appendChild(svgEl('circle', {cx, cy, r:Rpx, fill:'none', stroke:accent, 'stroke-width':2}));
    for(let i=1;i<s.rings;i++){
      const theta = (i*s.ringAngleStep)*Math.PI/180;
      const y = cy - Rpx*Math.cos(theta);
      const ringR = Rpx*Math.sin(theta);
      sideSvg.appendChild(svgEl('line', {x1:cx-ringR, y1:y, x2:cx+ringR, y2:y, stroke:'#4fa3e3', 'stroke-width':1.4, opacity:0.75}));
    }
    sideSvg.appendChild(svgEl('line', {x1:cx, y1:cy-Rpx, x2:cx, y2:cy+Rpx, stroke:'#c26bd8', 'stroke-width':1.2, opacity:0.6}));

    frontSvg.appendChild(svgEl('circle', {cx, cy, r:Rpx, fill:'none', stroke:accent, 'stroke-width':2}));
    const segs = Math.min(s.segs, 16);
    for(let i=0;i<segs;i++){
      const a = (i/segs)*2*Math.PI;
      frontSvg.appendChild(svgEl('line', {x1:cx, y1:cy, x2:cx+Rpx*Math.cos(a), y2:cy+Rpx*Math.sin(a), stroke:'#c26bd8', 'stroke-width':1, opacity:0.5}));
    }
  }

  function buildTutorial(){
    let title, sub, steps;
    if(shape==='cone'){
      title = 'Building this cone in BABFT';
      sub = 'Turns your numbers into a rotated ring of triangular pieces around a center point.';
      steps = [
        ['Place your center point', 'Drop a small block or fixed part at the exact spot you want the cone\'s tip to sit above — this is your rotation anchor.'],
        ['Build one triangular face', 'Use the slant length and base edge length above to size one wedge/triangle piece — apex at the top point, base edge at the bottom.'],
        ['Rotate and duplicate', `Copy that face, then rotate each copy by the exterior angle (${computeCone().exteriorAngle.toFixed(1)}° here) around the center point until you\'ve placed all ${state.sides} faces.`],
        ['Weld or fix in place', 'Use fixed/weld blocks to lock every face to the center anchor so the whole cone moves as one piece.'],
        ['Check the seam', 'Make sure the last face lines up back with the first — if there\'s a gap, your angle math is off, so double check sides and diameter above.']
      ];
    } else if(shape==='pyramid'){
      title = 'Building this pyramid in BABFT';
      sub = 'A pyramid is the same idea as the cone, just with flat triangular faces instead of a curved surface.';
      steps = [
        ['Lay out the base polygon', `Place ${state.sides} corner points evenly spaced in a circle using the base edge length (${computePyramid().baseEdge.toFixed(1)}) between each corner.`],
        ['Mark the apex', 'Place a single point directly above the center of that base polygon, at your chosen height.'],
        ['Build one triangular face', 'Use the slant edge length (corner to apex) and base edge length above to size one face triangle.'],
        ['Rotate around the center', `Duplicate the face and rotate each copy by the exterior angle (${computePyramid().exteriorAngle.toFixed(1)}°) until all ${state.sides} faces are placed.`],
        ['Weld everything together', 'Fix all faces to the apex point (or a central beam) so the pyramid holds together as one rigid piece.']
      ];
    } else {
      title = 'Building this sphere in BABFT';
      sub = 'Spheres are usually built as stacked rings that shrink toward the top and bottom, like a globe.';
      steps = [
        ['Set your ring heights', `Stack ${state.rings} horizontal rings, spaced using the angle-per-ring value above so they follow the curve instead of a straight cone.`],
        ['Size each ring', 'Each ring\'s radius shrinks as you move away from the equator — the widest ring sits in the middle at the equator radius shown above.'],
        ['Build ring segments', `Each ring is made of ${state.sides} short straight pieces going around — treat each ring like a mini version of the cone technique, using its own radius.`],
        ['Stack and align', 'Center every ring on the same vertical axis so they line up into a smooth-looking curve rather than a wobbly stack.'],
        ['Weld the whole stack', 'Fix all rings to a central vertical beam so the sphere holds its shape as one object.']
      ];
    }
    tutTitle.textContent = title;
    document.getElementById('tutSub').textContent = sub;
    tutSteps.innerHTML = steps.map(([t,d])=>`<li><div class="step-body"><strong>${t}</strong><p>${d}</p></div></li>`).join('');
  }

  function render(){
    buildResults();
    if(shape==='cone') drawCone();
    else if(shape==='pyramid') drawPyramid();
    else drawSphere();
    buildTutorial();
  }

  document.querySelectorAll('.shape-tabs button').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      document.querySelectorAll('.shape-tabs button').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      shape = btn.dataset.shape;
      buildFields();
      render();
    });
  });

  buildFields();
  render();
</script>
